<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:"SF Pro Text",system-ui,-apple-system,BlinkMacSystemFont,sans-serif;background:#111}
.g-nav{position:fixed;top:0;left:0;right:0;z-index:100;height:44px;background:#000;display:flex;align-items:center;padding:0 20px;gap:12px}
.g-nav__logo{color:#fff;font-size:14px;font-weight:600;letter-spacing:-.374px;white-space:nowrap}

.g-nav__pagelink{margin-left:auto;display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.7);font-size:13px;text-decoration:none;padding:0 12px;height:44px;white-space:nowrap;flex-shrink:0;transition:color .15s}

.viewer-wrap{position:fixed;top:44px;left:0;right:0;bottom:0}

.fallback{display:none;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:20px;color:rgba(255,255,255,.6);text-align:center;padding:40px}

<body>
<nav class="g-nav">
